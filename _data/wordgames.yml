# ══════════════════════════════════════════════════════════════
#  TAP & FIND — word games
#  Each set is a themed group of things the little one can learn to name.
#  The game asks "can you find the puppy?" and shows a few choices.
#  As the little one grows, make sets bigger or add harder themes (shapes,
#  colours, letters). Each item: an art key and the word to say.
# ══════════════════════════════════════════════════════════════

- id: animal-friends
  title: "Animal friends"
  age: "1+"
  # Adaptive tags — see _data/stories.yml header for the vocabulary.
  age_band: [12-24m]
  skills: [communicating, focus, connections]
  items:
    - art: dog
      label: "the puppy"
    - art: cat
      label: "the kitty"
    - art: bird
      label: "the birdie"
    - art: fish
      label: "the fishy"
    - art: duck
      label: "the duck"
    - art: butterfly
      label: "the butterfly"

- id: out-in-the-world
  title: "Out in the world"
  age: "1+"
  age_band: [12-24m]
  skills: [communicating, focus, connections]
  items:
    - art: sun
      label: "the sun"
    - art: moon
      label: "the moon"
    - art: star
      label: "the star"
    - art: flower
      label: "the flower"
    - art: tree
      label: "the tree"
    - art: cloud
      label: "the cloud"

- id: things-i-know
  title: "Things I know"
  age: "1+"
  age_band: [12-24m]
  skills: [communicating, focus, connections, self-directed]
  items:
    - art: apple
      label: "the apple"
    - art: ball
      label: "the ball"
    - art: car
      label: "the car"
    - art: boat
      label: "the boat"

# A sounds game — the companion to the story "Chatter, Chatter". Instead of
# "Can you find X?", it asks "Who says woof?" (the optional `ask:` template).
# The grown-up makes the sound; the little one finds who made it.
- id: who-says
  title: "Who says…?"
  age: "1+"
  voice: pooja
  age_band: [12-24m]
  skills: [communicating, focus, connections]
  ask: "Who says {label}?"
  items:
    - art: dog
      label: "woof"
    - art: cat
      label: "meow"
    - art: duck
      label: "quack"
    - art: bird
      label: "tweet"

# Weather & sky — uses the "rain" picture (the only art not yet in a game) and
# pairs with the story "Splish, Splash!".
- id: weather-and-sky
  title: "Weather & sky"
  age: "1+"
  age_band: [12-24m]
  skills: [communicating, focus, connections]
  items:
    - art: sun
      label: "the sun"
    - art: cloud
      label: "the cloud"
    - art: rain
      label: "the rain"
    - art: star
      label: "the star"
    - art: moon
      label: "the moon"

# ── A NEW MECHANIC (mode: odd-one-out) ── the first critical-thinking game and
#  the first 2-3y content. The engine shows a majority group + one outlier and
#  asks "which one is different?"; tap the odd one. Built the schema-driven way:
#  a new game TYPE = one schema branch + one GAME_TYPES registry entry + this data.
- id: which-is-different
  title: "Which is different?"
  age: "2+"
  age_band: [2-3y]
  skills: [critical-thinking]
  mode: odd-one-out
  prompt: "Which one is <b>different</b>?"
  groups:
    - [dog, cat, duck, bird, fish]     # animals
    - [car, boat]                       # things that go
    - [sun, moon, star, cloud]          # up in the sky
    - [apple, ball]                     # little round things

# ── A NEW MECHANIC (mode: count) ── the first counting game, and the first-ever
#  3-4y content. The engine shows a small set (2–4) of ONE picture and asks
#  "how many?"; tapping EACH one counts it aloud together (one, two, three…) and
#  cheers the total. Early numeracy as a shared lap activity — every tap is a
#  count, there is no wrong tap (a repeat tap is a gentle no-op). Built the
#  schema-driven way: one schema branch (countGame + anyGame oneOf) + one
#  GAME_TYPES registry entry + serialization (rounds) + this data. No new art.
- id: count-with-me
  title: "Count with me!"
  age: "2+"
  age_band: [2-3y, 3-4y]
  skills: [connections, focus]
  mode: count
  prompt: "Let's count the <b>{label}</b> — together!"
  rounds:
    - art: duck
      label: "ducks"
      count: 2
      cue: "Point at each duck together — “one… two…” — then pause and let the little one tap."
    - art: star
      label: "stars"
      count: 3
      cue: "You count aloud, the little one taps. Pause after each number — the pause is the turn."
    - art: apple
      label: "apples"
      count: 3
      cue: "Count on fingers as you go. Any tap is a good tap — describe it: “you tapped an apple!”"
    - art: flower
      label: "flowers"
      count: 4
      cue: "Four is a lot! Go slow, wait between numbers, and let the little one set the pace."
    - art: ball
      label: "balls"
      count: 2
      cue: "After counting, ask “more?” and wait — whatever answer comes back is the right one."
