<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>{{ page.title | default: site.title }}</title>

<!-- Install-to-home-screen → opens fullscreen on mobile -->
<link rel="manifest" href="{{ '/manifest.json' | relative_url }}">
<meta name="theme-color" content="#5BB0C7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Little One">
<link rel="apple-touch-icon" href="{{ '/assets/icons/apple-touch-icon.png' | relative_url }}">

<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
<div class="app">
{{ content }}
</div>
<script>
/* iOS Safari can't hide the URL bar in a browser tab; true fullscreen needs
   Add-to-Home-Screen (the manifest + apple meta make it fullscreen then). Show a
   gentle, dismissible hint on iOS Safari only. */
(function(){
  try{
    if(!/iPhone|iPad|iPod/.test(navigator.userAgent||'')) return;
    var standalone = navigator.standalone || (window.matchMedia && window.matchMedia('(display-mode: standalone), (display-mode: fullscreen)').matches);
    if(standalone) return;
    if(localStorage.getItem('lo.a2hs')==='1') return;
    var b=document.createElement('div'); b.className='a2hs';
    b.innerHTML='<span>Full screen: tap <b>Share</b> then <b>Add to Home Screen</b></span><button aria-label="Dismiss">×</button>';
    document.body.appendChild(b);
    b.querySelector('button').onclick=function(){ try{localStorage.setItem('lo.a2hs','1');}catch(e){} b.remove(); };
  }catch(e){}
})();
</script>
</body>
</html>
