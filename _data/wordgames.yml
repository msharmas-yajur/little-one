# ══════════════════════════════════════════════════════════════
#  TAP & FIND — word games
#  Each set is a themed group of things she can learn to name.
#  The game asks "can you find the puppy?" and shows a few choices.
#  As she grows, make sets bigger or add harder themes (shapes,
#  colours, letters). Each item: an art key and the word to say.
# ══════════════════════════════════════════════════════════════

- id: animal-friends
  title: "Animal friends"
  age: "1+"
  # Adaptive tags — see _data/stories.yml header for the vocabulary.
  age_band: [12-24m]
  skills: [communicating, focus, connections]
  items:
    - art: dog
      label: "the puppy"
    - art: cat
      label: "the kitty"
    - art: bird
      label: "the birdie"
    - art: fish
      label: "the fishy"
    - art: duck
      label: "the duck"
    - art: butterfly
      label: "the butterfly"

- id: out-in-the-world
  title: "Out in the world"
  age: "1+"
  age_band: [12-24m]
  skills: [communicating, focus, connections]
  items:
    - art: sun
      label: "the sun"
    - art: moon
      label: "the moon"
    - art: star
      label: "the star"
    - art: flower
      label: "the flower"
    - art: tree
      label: "the tree"
    - art: cloud
      label: "the cloud"

- id: things-i-know
  title: "Things I know"
  age: "1+"
  age_band: [12-24m]
  skills: [communicating, focus, connections, self-directed]
  items:
    - art: apple
      label: "the apple"
    - art: ball
      label: "the ball"
    - art: car
      label: "the car"
    - art: boat
      label: "the boat"

# A sounds game — the companion to the story "Chatter, Chatter". Instead of
# "Can you find X?", it asks "Who says woof?" (the optional `ask:` template).
# The grown-up makes the sound; the little one finds who made it.
- id: who-says
  title: "Who says…?"
  age: "1+"
  age_band: [12-24m]
  skills: [communicating, focus, connections]
  ask: "Who says {label}?"
  items:
    - art: dog
      label: "woof"
    - art: cat
      label: "meow"
    - art: duck
      label: "quack"
    - art: bird
      label: "tweet"

# Weather & sky — uses the "rain" picture (the only art not yet in a game) and
# pairs with the story "Splish, Splash!".
- id: weather-and-sky
  title: "Weather & sky"
  age: "1+"
  age_band: [12-24m]
  skills: [communicating, focus, connections]
  items:
    - art: sun
      label: "the sun"
    - art: cloud
      label: "the cloud"
    - art: rain
      label: "the rain"
    - art: star
      label: "the star"
    - art: moon
      label: "the moon"
