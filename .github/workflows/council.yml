name: Review Council

# The Review Council (PRD 0003 / knowledge-base/COUNCIL.md): a panel of six
# rubric-anchored LLM judges + a Chairman that reviews one generated artifact
# and returns publish / revise / escalate, with every verdict citing KB
# principles. Manual for now (its first duties are voice QA + advisory
# second-opinions on Gardener proposals); later it becomes the instance-gate in
# the generation pipelines. Build-time only — never runs on the child's device.

on:
  workflow_dispatch:
    inputs:
      story_id:
        description: "Review a story by id (from _data/stories.yml), e.g. chatter-chatter"
        required: false
        type: string
      game_id:
        description: "OR review a word-game by id (from _data/wordgames.yml), e.g. who-says"
        required: false
        type: string

permissions:
  contents: write   # record the verdict as a ledger event on main (PRD 0004 arc 1)

concurrency:
  group: council
  cancel-in-progress: false

jobs:
  council:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet anthropic pyyaml

      - name: Convene the Council
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STORY_ID: ${{ github.event.inputs.story_id }}
          GAME_ID: ${{ github.event.inputs.game_id }}
        run: |
          set -uo pipefail
          if [ -n "${STORY_ID:-}" ]; then
            args="--story $STORY_ID"
          elif [ -n "${GAME_ID:-}" ]; then
            args="--game $GAME_ID"
          else
            echo "::error::Provide a story_id or a game_id to review."; exit 1
          fi

          target="${STORY_ID:-$GAME_ID}"
          ledger="knowledge-base/ledger/council/$(date -u +%F)-${target}.md"
          echo "LEDGER_FILE=$ledger" >> "$GITHUB_ENV"

          set +e
          python council/review.py $args --out /tmp/council-report.md \
            --ledger-out "/tmp/ledger-event.md" --run-id "${{ github.run_id }}"
          code=$?
          set -e

          # Exit codes from review.py encode the gate: 0 publish · 20 revise · 30 escalate
          case "$code" in
            0)  decision="🟢 PUBLISH (unanimous approve)";;
            20) decision="🟡 REVISE (a seat asked for changes)";;
            30) decision="🔴 ESCALATE (reject / Guardian hold / seat error)";;
            *)  echo "::error::Council run failed (exit $code)."; cat /tmp/council-report.md 2>/dev/null; exit "$code";;
          esac

          {
            echo "## 🏛️ Review Council decision: $decision"
            echo ""
            cat /tmp/council-report.md
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Council decision: $decision"

      # PRD 0004 arc 1: every verdict becomes a permanent ledger event on main —
      # an append-only RECORD of something that already happened (like a CI log),
      # which is why it commits directly rather than opening a gated PR. The
      # Librarian reads these; no verdict is ever lost to /tmp again.
      - name: Record verdict to the ledger
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          [ -f /tmp/ledger-event.md ] || { echo "No ledger event produced (early failure) — nothing to record."; exit 0; }
          git config user.name "council[bot]"
          git config user.email "council[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          # The ledger lives on main even when the Council reviewed another ref
          git fetch origin main
          git checkout -B ledger-record origin/main
          mkdir -p "$(dirname "$LEDGER_FILE")"
          cp /tmp/ledger-event.md "$LEDGER_FILE"
          git add "$LEDGER_FILE"
          git commit -m "🏛️ Ledger: council verdict — $(basename "$LEDGER_FILE" .md)"
          # push with one rebase retry in case main moved during the run
          git push origin ledger-record:main || { git fetch origin main && git rebase origin/main && git push origin ledger-record:main; }
          echo "Recorded: $LEDGER_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: council-report
          path: /tmp/council-report.md
          if-no-files-found: ignore
