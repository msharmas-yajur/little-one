name: gardener-probe (temporary)
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Minimal Anthropic API probe (status + error type only)
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -uo pipefail
          code=$(curl -s -o /tmp/resp.json -w '%{http_code}' https://api.anthropic.com/v1/messages \
            -H "x-api-key: $KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{"model":"claude-opus-4-8","max_tokens":8,"messages":[{"role":"user","content":"hi"}]}')
          echo "HTTP status: $code"
          echo "error.type:    $(jq -r '.error.type // "(none)"' /tmp/resp.json 2>/dev/null)"
          echo "error.message: $(jq -r '.error.message // "(none)"' /tmp/resp.json 2>/dev/null)"
          echo "stop_reason:   $(jq -r '.stop_reason // "(none)"' /tmp/resp.json 2>/dev/null)"
