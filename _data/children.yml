# ══════════════════════════════════════════════════════════════
#  THE CHILDREN
#  One block per grandchild. This is how the site becomes specific
#  to each of them. To add a new grandchild, copy a block, give a
#  new id and name, pick a colour, and choose which stories/games
#  they see. Everyone can share the same content to start, and you
#  branch whenever you like.
#
#  colour  — the accent used on their page (any hex value)
#  greeting— shown at the top of their page
#  stories — list of story ids from _data/stories.yml
#            (use "all" to include every shared story)
#  games   — list of word-game ids from _data/wordgames.yml
#            (use "all" to include every shared game)
#  notes   — private notes to yourself: what she responds to,
#            words she's trying, what to add next. Not shown on site.
# ══════════════════════════════════════════════════════════════

- id: little-one
  name: "Little One"
  colour: "#5BB0C7"
  greeting: "Shall we read together?"
  stories: all
  games: all
  # Which month of the 12-month arc you're currently practising (1–12).
  # Bump this number as you move through the year.
  month: 1
  notes: |
    First child on the site — the grand niece, around 1 year.
    Watching for: which pictures get the biggest reaction.
    Next to try: adding her real name into a story line.

