# ══════════════════════════════════════════════════════════════
#  SHARED STORIES
#  This is the file you'll edit most as the children grow.
#  Each story has an id, a title, an age hint, and a list of pages.
#  Each page: a scene colour, a line to read aloud, an art key,
#  and a cue (a gentle reminder for YOU, the grown-up).
#
#  Art keys available (see assets/js/art.js): sun, bird, dog, cat,
#  fish, moon, star, flower, cloud, butterfly, duck, apple, ball,
#  rain, tree, boat, car.
#
#  To add a new story: copy a block, change the id, and write pages.
#  To add a page: add another "- line / art / cue / sky" entry.
#  Sky options: morning, day, garden, night, rain.
# ══════════════════════════════════════════════════════════════

- id: little-ones-day
  title: "Little One's Day"
  age: "1+"
  # Adaptive tags (optional — used by the dyad model to pick & pace content):
  #   age_band: 6-12m | 12-24m | 2-3y | 3-4y | 4-5y
  #   skills (Galinsky's 7): focus perspective communicating connections
  #                          critical-thinking challenges self-directed
  age_band: [12-24m]
  skills: [communicating, focus, connections]
  pages:
    - sky: morning
      line: "Good morning, sun! You're up so high."
      art: sun
      cue: "Point up. Say “sun!” and let her tap it."
    - sky: morning
      line: "A little bird says hop, hop, hop."
      art: bird
      cue: "Hop your fingers along her arm as you read."
    - sky: garden
      line: "The puppy wags and wants to play."
      art: dog
      cue: "Try a soft “woof” — she may try to copy you."
    - sky: garden
      line: "A flower grows to say hello."
      art: flower
      cue: "Wave hello to the flower together."
    - sky: day
      line: "A butterfly floats by so slow."
      art: butterfly
      cue: "Float your hand slowly through the air."
    - sky: night
      line: "Now stars come out, one, two, three."
      art: star
      cue: "Count on her fingers: one, two, three."
    - sky: night
      line: "Goodnight, moon. Goodnight from me."
      art: moon
      cue: "A whisper works well for this last line."

- id: splish-splash
  title: "Splish, Splash!"
  age: "1+"
  voice: priya
  age_band: [12-24m]
  skills: [communicating, connections]
  pages:
    - sky: rain
      line: "Pitter-patter, down comes the rain."
      art: rain
      cue: "Tap fingertips on the back of her hand — soft rain."
    - sky: rain
      line: "A little duck goes quack, quack, quack."
      art: duck
      cue: "Try a happy “quack!” — ducks love puddles."
    - sky: day
      line: "Out comes the sun to dry the ground."
      art: sun
      cue: "Open your arms wide like the warm sun."
    - sky: garden
      line: "And up jumps a tree, tall and round."
      art: tree
      cue: "Stretch up tall together like the tree."

- id: things-that-fall
  title: "Things That Fall"
  age: "1+"
  age_band: [12-24m]
  skills: [critical-thinking, connections]
  evidence: gopnik-notes.md
  pages:
    - sky: day
      line: "Little One holds a bright red ball."
      art: ball
      cue: "Hold something up together, then let it go."
    - sky: day
      line: "She opens her hand… down it goes!"
      art: ball
      cue: "Say “down!” as it drops. She's learning how things fall."
    - sky: garden
      line: "An apple falls, thud, from the tree."
      art: apple
      cue: "A soft “thud!” — heavy things land with a thump."
    - sky: day
      line: "A leaf floats slowly, side to side."
      art: tree
      cue: "Float your hand down slowly — leaves take their time."
    - sky: day
      line: "Some things go thud and some things float."
      art: cloud
      cue: "Wonder aloud: “Which one floats?” No right answer needed."
    - sky: garden
      line: "Do it again! What will fall now?"
      art: ball
      cue: "Repeating IS the learning. Let her lead the next drop."

- id: try-try-again
  title: "Try, Try Again"
  age: "1+"
  age_band: [12-24m]
  skills: [challenges, self-directed, focus]
  evidence: books/mind-in-the-making.md
  pages:
    - sky: day
      line: "The ball rolls off — away, away it goes!"
      art: ball
      cue: "Pause. Let her set off after it — the trying is hers."
    - sky: garden
      line: "Little One crawls. So close now… almost THERE!"
      art: ball
      cue: "Cheer the effort first: “You're trying so hard!” Wait before you help."
    - sky: garden
      line: "An apple hangs high. Can she stretch, stretch, and reach?"
      art: apple
      cue: "Let her strain a little before you lift her — the reach is the win."
    - sky: day
      line: "A little bird tries, and tries — then up she flies!"
      art: bird
      cue: "Flap slowly together: “She tried and tried, and did it!”"
    - sky: night
      line: "You tried so hard. Goodnight, little star."
      art: star
      cue: "A whisper for the last line. Praise the trying, not just the winning."

# ── PEEK-A-BOO ── flap pages hide a picture; tap to lift the flap and reveal it.
#  A page with `flap: true` hides its `art` under a flap ("Where's the …?" → tap →
#  reveal + `reveal:` line). A page with `mirror: true` opens to the front camera
#  (a live, on-device mirror — never recorded or uploaded; grown-up grants access).
- id: peekaboo
  title: "Peek-a-boo!"
  age: "1+"
  voice: kavya
  age_band: [6-12m, 12-24m]
  skills: [critical-thinking, focus, perspective]
  evidence: videos/thrive-by-five-molly-wright.md
  pages:
    - sky: garden
      flap: true
      art: duck
      line: "Where's the duck?"
      reveal: "There she is! Quack, quack! 🦆"
      cue: "Let her tap the flap — then say “peek-a-boo!” together."
    - sky: day
      flap: true
      art: cat
      line: "Where's the kitty?"
      reveal: "Peek-a-boo! There's the kitty! 🐱"
      cue: "Wait for the reveal, then her giggle. Do it again if she loves it."
    - sky: morning
      flap: true
      art: dog
      line: "Where's the puppy?"
      reveal: "There he is! Woof, woof! 🐶"
      cue: "Try a soft “woof!” as the puppy pops out."
    - sky: night
      flap: true
      art: star
      line: "Where's the little star?"
      reveal: "Twinkle, twinkle — there it is! ⭐"
      cue: "A whisper suits the night sky. Point up afterwards."
    - sky: day
      mirror: true
      line: "And where's… YOU?"
      reveal: "Peek-a-boo — it's you! 💛"
      cue: "Open the last flap to find the little one in the mirror."

# ── For the youngest (6–12m): a serve-and-return sound story. Each page offers a
#  sound to make together, then a PAUSE for the baby's babble — the grown-up's
#  voice (never the app) is the language mechanism.
- id: chatter-chatter
  title: "Chatter, Chatter"
  age: "6m+"
  age_band: [6-12m, 12-24m]
  skills: [communicating, connections]
  evidence: videos/thrive-by-five-molly-wright.md
  pages:
    - sky: morning
      line: "The puppy says woof. Now… what will YOU say?"
      art: dog
      cue: "Make the “woof,” then pause. Whatever sound comes back is her turn — say it right back to her."
    - sky: garden
      line: "The kitty says mew — then waits for you."
      art: cat
      cue: "Mew, then wait, just like the line does. Copy the babble she offers — that's a real little conversation."
    - sky: rain
      line: "The duck says quack-quack, and splashes away!"
      art: duck
      cue: "Quack, then leave a gap. Her babble is a word finding its way out — greet it warmly."
    - sky: day
      line: "A little bird tweets from a branch up high."
      art: bird
      cue: "Point up and tweet. Serve a sound, then give her a beat to send one back to you."
    - sky: night
      line: "You chattered all day. Goodnight, sleepy sky."
      art: moon
      cue: "Whisper goodnight — then wait, and let her have the very last word."
