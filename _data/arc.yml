# ══════════════════════════════════════════════════════════════
#  THE 12-MONTH ARC  —  "practices," one per month
#
#  Grounded in Alison Gopnik's developmental science (The Scientist
#  in the Crib; The Gardener and the Carpenter). Each month is a
#  STANCE THE GROWN-UP PRACTISES, not a lesson the child must pass.
#  The child's only job is to play and respond.
#
#  Sequenced to roughly track a child through the second year, but
#  the order is a suggestion — follow the real child, not the calendar.
#
#  Each month links to:
#    story:      an id in stories.yml that embodies the theme
#    game:       an id in wordgames.yml that fits (optional)
#  and carries:
#    stance:     the one-line practice
#    why:        plain-language reason (the science, briefly)
#    invitations: things the GROWN-UP sets up, each with a "watch"
#                 note — what to notice as evidence of the learning
#    onsite:     the short prompt shown on the site's grown-up card
# ══════════════════════════════════════════════════════════════

- month: 1
  title: "Let them explore"
  gopnik: "The child as explorer"
  stance: "When the little one drops, bangs, or repeats something, let it happen and put words to it."
  why: >
    Repetition is not aimlessness — it's how the little one discovers whether
    the world behaves the same way twice. Interrupting the play to tidy up
    cuts short the learning they're giving themselves.
  story: things-that-fall
  game: animal-friends
  onsite: "This month: when the little one repeats something, let it run — and name what happens."
  invitations:
    - do: "Offer a few safe objects and a low box or bowl. Let the little one put in, take out, repeat."
      watch: "The same action done again and again — that repetition is the learning happening."
    - do: "Narrate one of their spontaneous discoveries aloud without stopping it: 'You dropped it — and it bounced!'"
      watch: "Whether they look up at you when you name it — the language-and-relationship loop firing."
    - do: "Give them two things that fall differently — a soft ball and a light scarf — and let them drop both."
      watch: "Any sign they notice the difference. That's comparing — early cause-and-effect."

- month: 2
  title: "Follow the lantern"
  gopnik: "Lantern attention (broad, not narrow)"
  stance: "Let the little one's attention lead. Join what they're already looking at instead of redirecting it."
  why: >
    Young children attend broadly, taking in everything at once, rather
    than focusing narrowly the way adults do. Following the little one's
    focus teaches them that their interests matter and are worth sharing.
  story: little-ones-day
  game: out-in-the-world
  onsite: "This month: notice what the LITTLE ONE is looking at, and join it."
  invitations:
    - do: "For one whole play session, don't introduce anything. Watch what the little one reaches for, and go there together."
      watch: "How the interest moves — they may flit between things. That breadth is the lantern, not distraction."
    - do: "When the little one points or stares at something, name it and wait."
      watch: "Whether they vocalise back. Turn-taking begins here."

- month: 3
  title: "Cause and effect, in little hands"
  gopnik: "Causal learning through action"
  stance: "Give the little one things where THEY make something happen — and let them do it themselves."
  why: >
    The little one is working out 'what makes what happen.' The learning is
    strongest when they are the cause, not the spectator — their own action
    is what teaches them.
  story: splish-splash
  game: things-i-know
  onsite: "This month: give the little one buttons to press, lids to lift — let them be the cause."
  invitations:
    - do: "Offer a toy or object where an action gives a clear result (a press, a shake, a lid)."
      watch: "The pause after they act — they're checking the result. That pause is thinking."
    - do: "Roll a ball to the little one and wait for them to send it back."
      watch: "Turn-taking and the idea that THEY can act on you, not just objects."

- month: 4
  title: "Do it where they can see"
  gopnik: "Learning through imitation and relationship"
  stance: "Do everyday things slowly and out loud where the little one can watch — they learn from trusted people."
  why: >
    Children learn what to do by watching people they trust, then copying.
    Narrated everyday tasks are richer lessons than any toy.
  story: little-ones-day
  onsite: "This month: let the little one watch you do simple things, and say what you're doing."
  invitations:
    - do: "Let the little one watch you stir, fold, or sweep. Describe it simply as you go."
      watch: "Any attempt to copy the motion — imitation is deep learning, not mimicry."
    - do: "Make an exaggerated happy face, wait, and see if they try it back."
      watch: "Early social imitation and emotion-sharing."

- month: 5
  title: "Wider, not righter"
  gopnik: "Variability over correctness"
  stance: "Offer open-ended things with no single right answer. Resist teaching the 'correct' use."
  why: >
    Exploration beats drilling. A block is a tower, a phone, a boat, a
    hat. Letting the use stay open keeps the little one inventing rather
    than performing.
  story: things-that-fall
  game: animal-friends
  onsite: "This month: offer open-ended things — and don't correct how the little one uses them."
  invitations:
    - do: "Give the little one simple open objects (cups, cloths, blocks) and add nothing else."
      watch: "The uses they invent that you didn't intend. That invention is the goal."
    - do: "When they use something 'wrong,' narrate it as if it's right: 'You're wearing the bowl as a hat!'"
      watch: "The delight at being understood — it fuels more exploring."

- month: 6
  title: "The pause that makes room"
  gopnik: "Serve-and-return; child as conversation partner"
  stance: "After you say or do something, pause a long beat and leave space for the little one's turn."
  why: >
    Language and thinking grow in the back-and-forth. The silence you
    leave is an invitation for the little one to fill — and they will,
    in their own way.
  story: splish-splash
  game: out-in-the-world
  onsite: "This month: say something, then wait — leave a long pause for the little one's turn."
  invitations:
    - do: "In any exchange, count silently to three after you speak before you speak again."
      watch: "What the little one does with the gap — a sound, a look, a gesture. That's taking a turn."
    - do: "Copy a sound the little one makes, then wait for them to do it again."
      watch: "A back-and-forth 'conversation' of sounds building."

- month: 7
  title: "Naming the inside weather"
  gopnik: "Understanding minds and feelings"
  stance: "Put simple words to the little one's feelings and yours, without fixing or judging them."
  why: >
    Children are working out that people have inner states. Naming
    feelings gives the little one the tools to understand themselves
    and others later.
  story: little-ones-day
  onsite: "This month: name feelings simply — the little one's and yours — as they happen."
  invitations:
    - do: "When the little one is frustrated or delighted, name it calmly: 'You're cross the tower fell.'"
      watch: "Whether naming it settles them a little. Being understood regulates."
    - do: "Name your own feeling out loud sometimes: 'I'm happy sitting with you.'"
      watch: "The little one's attention to your face — they're reading you."

- month: 8
  title: "Pretend opens a door"
  gopnik: "Counterfactual thinking / early pretend"
  stance: "Follow and gently extend any hint of pretend — feeding a toy, 'talking' on a block."
  why: >
    Pretend play is the child rehearsing possibilities — imagining things
    that aren't real is the same muscle used later for planning and
    invention.
  story: splish-splash
  game: animal-friends
  onsite: "This month: join the little one's pretend — feed the toy, answer the 'phone.'"
  invitations:
    - do: "Offer a cup to a toy and 'give it a drink,' then hand it to the little one."
      watch: "Whether they continue the pretend. Extending it is imaginative leap-making."
    - do: "Make a block 'ring' and hold it to your ear."
      watch: "Any imitation of the pretend — the little one is entering the as-if world."

- month: 9
  title: "Small choices, real agency"
  gopnik: "Autonomy and self-directed exploration"
  stance: "Offer genuine small choices and honour whichever one the little one picks."
  why: >
    Self-direction builds the persistence and confidence that predict
    later flourishing far more than early academics do.
  story: little-ones-day
  game: things-i-know
  onsite: "This month: offer real small choices — and follow the little one's pick."
  invitations:
    - do: "Hold up two options (this book or that one?) and go with the little one's choice."
      watch: "The seriousness of the choosing — agency matters to them."
    - do: "Let the little one set the pace of an activity, even if it's slower than you'd like."
      watch: "How long they'll persist when it's their own direction."

- month: 10
  title: "Words for the world"
  gopnik: "Rich language input; labelling"
  stance: "Name things generously and specifically as you move through the day together."
  why: >
    The sheer amount and richness of words the little one hears strongly
    shapes later language. Specific words ('sparrow,' not just 'bird')
    widen their world.
  story: things-that-fall
  game: out-in-the-world
  onsite: "This month: name things richly and specifically as you go."
  invitations:
    - do: "On a slow walk, name what you both see, a little more specifically than usual."
      watch: "Words the little one tries to echo. Attempts, not accuracy, are the milestone."
    - do: "Use real words alongside baby words: 'doggie — a big brown dog!'"
      watch: "Which words the little one reaches for first."

- month: 11
  title: "Let them solve it"
  gopnik: "Problem-solving through productive struggle"
  stance: "When the little one is stuck, wait before helping — a little struggle is the learning."
  why: >
    Jumping in too fast removes the very challenge that builds
    persistence. A beat of struggle, with you nearby, is where grit
    starts.
  story: splish-splash
  game: things-i-know
  onsite: "This month: when the little one is stuck, pause — let them try before you help."
  invitations:
    - do: "When something's just out of reach or a lid won't come, wait a few seconds before stepping in."
      watch: "The strategies the little one tries. The trying is the point, not the success."
    - do: "Offer the smallest possible help — a hint, not a rescue — then step back again."
      watch: "Whether they finish it themselves with just a nudge."

- month: 12
  title: "Look how far — and keep going"
  gopnik: "The gardener's long view"
  stance: "Step back and see who the little one is becoming; let them lead you, and add nothing you don't need to."
  why: >
    The gardener tends the soil rather than carving the plant. A year in,
    the practice is trusting the environment you've built and the person
    the little one is growing into — on their own timeline.
  story: little-ones-day
  game: animal-friends
  onsite: "This month: step back, watch who the little one is becoming, and follow their lead."
  invitations:
    - do: "Spend one session adding nothing — no new toy, no prompt. Just be present and follow."
      watch: "Everything the little one now does on their own that they couldn't a year ago."
    - do: "Return to Month 1's dropping game. See how differently the little one plays it now."
      watch: "The change in them — proof of a year of their own exploring and learning."
